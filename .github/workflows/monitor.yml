name: Monitor Graduatoria UniNA

on:
  schedule:
    - cron: '*/5 * * * *'   # ogni 5 minuti
  workflow_dispatch:          # esecuzione manuale dalla pagina GitHub

concurrency:
  group: monitor-run
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Installa dipendenze
        run: pip install requests pypdf

      - name: Esegui monitor
        run: python3 monitor_unina.py --once

      - name: Salva stato aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitor_unina_state.json
          git diff --staged --quiet || (git commit -m "chore: update monitor state" && git pull --rebase && git push)
